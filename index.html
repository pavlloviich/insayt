<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>INSAYT</title>
  <style>
    .topic-chip { padding:6px 10px; border:1px solid #ccc; border-radius:8px; margin:4px; cursor:pointer; display:inline-block;}
    .active { background:#000; color:#fff; }
  </style>
</head>
<body>

<h3>Темы</h3>
<div id="topics">
  <div class="topic-chip active" onclick="filterTopic(this)">Деньги</div>
  <div class="topic-chip active" onclick="filterTopic(this)">Отношения</div>
  <div class="topic-chip active" onclick="filterTopic(this)">Карьера</div>
</div>

<script>
function applyTopicFilter() {
  console.log("Фильтр применён");
}

// FIXED VERSION
function filterTopic(el) {
  const allChips = document.querySelectorAll('.topic-chip');
  const activeCount = Array.from(allChips).filter(c => c.classList.contains('active')).length;

  if (el.classList.contains('active') && activeCount === 1) {
    return;
  }

  el.classList.toggle('active');
  applyTopicFilter();
}
</script>

</body>
</html>
