<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИНСАЙТ — Админка</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var hasToken = params.get('token') === 'insayt2026';
  var hasSession = false;
  try { hasSession = sessionStorage.getItem('insayt_admin') === '1'; } catch(e) {}

  if (!hasToken && !hasSession) {
    // Показываем форму пароля
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('password-screen').style.display = 'flex';
    });
  } else {
    // Сохраняем сессию и сразу показываем контент
    try { sessionStorage.setItem('insayt_admin', '1'); } catch(e) {}
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('admin-content').style.display = 'block';
      loadAll();
    });
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #f5f6fa;
    font-family: 'Manrope', sans-serif;
    color: #1a1a2e;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid #e0e3f0;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 800;
    color: #3d5af1;
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-box {
    flex: 1;
    background: white;
    border: 1px solid rgba(61,90,241,0.12);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(61,90,241,0.06);
  }

  .stat-box .val {
    font-size: 28px;
    font-weight: 800;
    color: #3d5af1;
  }

  .stat-box .lbl {
    font-size: 11px;
    color: #7b82a0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #7b82a0;
    margin-bottom: 12px;
  }

  .q-card {
    background: white;
    border: 1px solid rgba(61,90,241,0.12);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(61,90,241,0.06);
  }

  .q-card.resolved {
    opacity: 0.6;
    border-color: #e0e3f0;
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .q-topic {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    background: rgba(61,90,241,0.08);
    color: #3d5af1;
  }

  .q-date {
    font-size: 11px;
    color: #7b82a0;
  }

  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 14px;
  }

  .q-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #7b82a0;
  }

  .vote-bar {
    height: 6px;
    background: #eef0f7;
    border-radius: 4px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .vote-bar-fill {
    height: 100%;
    background: #3d5af1;
    border-radius: 4px;
    transition: width 0.3s;
  }

  .vote-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .vote-yes-label { color: #0abf7e; }
  .vote-no-label { color: #f05454; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn-yes {
    padding: 11px;
    background: rgba(10,191,126,0.1);
    color: #0abf7e;
    border: 1.5px solid rgba(10,191,126,0.3);
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-no {
    padding: 11px;
    background: rgba(240,84,84,0.1);
    color: #f05454;
    border: 1.5px solid rgba(240,84,84,0.3);
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-yes:hover { background: rgba(10,191,126,0.2); }
  .btn-no:hover { background: rgba(240,84,84,0.2); }
  .btn-yes:active, .btn-no:active { transform: scale(0.97); }

  .resolved-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    width: 100%;
    justify-content: center;
  }

  .btn-delete {
    width: 100%;
    padding: 10px;
    background: rgba(240,84,84,0.06);
    color: #f05454;
    border: 1.5px solid rgba(240,84,84,0.2);
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete:hover { background: rgba(240,84,84,0.15); }
  .btn-delete:active { transform: scale(0.97); }

  .loading {
    text-align: center;
    padding: 40px;
    color: #7b82a0;
    font-size: 15px;
  }

  .password-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 16px;
  }

  .password-screen h2 {
    font-size: 22px;
    font-weight: 800;
    color: #3d5af1;
  }

  .password-screen input {
    width: 100%;
    max-width: 300px;
    padding: 14px 18px;
    border: 1.5px solid rgba(61,90,241,0.2);
    border-radius: 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    outline: none;
    text-align: center;
  }

  .password-screen button {
    width: 100%;
    max-width: 300px;
    padding: 14px;
    background: linear-gradient(135deg, #3d5af1, #2541b2);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="password-screen" class="password-screen" style="display:none;">
  <div style="font-size:40px;">🔐</div>
  <h2>ИНСАЙТ Админка</h2>
  <div style="display:flex; align-items:center; gap:8px; width:100%; max-width:300px;">
    <input type="password" id="pwd-input" placeholder="Введи пароль" onkeydown="if(event.key==='Enter') checkPassword()" style="flex:1; padding:14px 18px; border:1.5px solid rgba(61,90,241,0.2); border-radius:14px; font-family:'Manrope',sans-serif; font-size:16px; outline:none; box-sizing:border-box;">
    <button onclick="togglePassword()" id="pwd-eye" style="background:#eef0f7; border:1.5px solid rgba(61,90,241,0.2); border-radius:12px; width:48px; height:48px; cursor:pointer; font-size:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center;">👁</button>
  </div>
  <button onclick="checkPassword()">Войти</button>
</div>

<div id="admin-content" style="display:none;">
  <div class="header">
    <h1>🔮 ИНСАЙТ</h1>
    <div style="font-size:13px; color:#7b82a0; font-weight:600;">Панель управления</div>
  </div>

  <div class="stats" id="stats-row">
    <div class="stat-box">
      <div class="val" id="stat-active">—</div>
      <div class="lbl">Активных</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-resolved">—</div>
      <div class="lbl">Закрытых</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-users">—</div>
      <div class="lbl">Пользователей</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-votes">—</div>
      <div class="lbl">Голосов</div>
    </div>
  </div>

  <div class="section-title">Активные вопросы</div>
  <div id="active-list"><div class="loading">Загрузка...</div></div>

  <div class="section-title" style="margin-top:24px;">Закрытые вопросы</div>
  <div id="resolved-list"><div class="loading">Загрузка...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jnvlcanwkrfcjeqqwlib.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x-ocfhMqmjrjn44Via5c8w_t_ooGf74';
const ADMIN_PASSWORD = 'insayt2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function togglePassword() {
  const input = document.getElementById('pwd-input');
  const eye = document.getElementById('pwd-eye');
  if (input.type === 'password') {
    input.type = 'text';
    eye.textContent = '🙈';
  } else {
    input.type = 'password';
    eye.textContent = '👁';
  }
}

function checkPassword() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('insayt_admin', '1');
    showAdmin();
  } else {
    showToast('❌ Неверный пароль');
  }
}

function showAdmin() {
  document.getElementById('password-screen').style.display = 'none';
  document.getElementById('admin-content').style.display = 'block';
  loadAll();
}

async function loadAll() {
  await Promise.all([loadStats(), loadQuestions()]);
}

async function loadStats() {
  const { count: active } = await db.from('questions').select('*', { count: 'exact', head: true }).eq('status', 'active');
  const { count: resolved } = await db.from('questions').select('*', { count: 'exact', head: true }).in('status', ['resolved_yes', 'resolved_no']);
  const { count: users } = await db.from('users').select('*', { count: 'exact', head: true });
  const { count: votes } = await db.from('votes').select('*', { count: 'exact', head: true });

  document.getElementById('stat-active').textContent = active || 0;
  document.getElementById('stat-resolved').textContent = resolved || 0;
  document.getElementById('stat-users').textContent = users || 0;
  document.getElementById('stat-votes').textContent = votes || 0;
}

async function loadQuestions() {
  const { data } = await db
    .from('questions')
    .select('*')
    .order('created_at', { ascending: false });

  if (!data) return;

  const active = data.filter(q => q.status === 'active');
  const resolved = data.filter(q => q.status !== 'active');

  renderList('active-list', active, false);
  renderList('resolved-list', resolved, true);
}

function renderList(containerId, questions, isResolved) {
  const container = document.getElementById(containerId);
  if (!questions.length) {
    container.innerHTML = `<div style="text-align:center; padding:20px; color:#7b82a0; font-size:14px;">Нет вопросов</div>`;
    return;
  }

  container.innerHTML = '';
  questions.forEach(q => {
    const total = q.votes_yes + q.votes_no;
    const pctYes = total > 0 ? Math.round(q.votes_yes / total * 100) : 50;
    const pctNo = 100 - pctYes;
    const date = q.closes_at ? new Date(q.closes_at).toLocaleDateString('ru') : 'Без даты';

    const card = document.createElement('div');
    card.className = 'q-card' + (isResolved ? ' resolved' : '');

    card.innerHTML = `
      <div class="q-meta">
        <div class="q-topic">${q.topic}</div>
        <div class="q-date">📅 ${date}</div>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="q-stats">
        <span>👥 ${total} голосов</span>
        <span>✓ ${q.option_yes} / ✗ ${q.option_no}</span>
      </div>
      <div class="vote-bar"><div class="vote-bar-fill" style="width:${pctYes}%"></div></div>
      <div class="vote-labels">
        <span class="vote-yes-label">ДА — ${pctYes}%</span>
        <span class="vote-no-label">НЕТ — ${pctNo}%</span>
      </div>
      ${isResolved ? `
        <div class="resolved-badge ${q.status === 'resolved_yes' ? 'resolved-yes' : 'resolved-no'}">
          ${q.status === 'resolved_yes' ? '✅ Сбылось' : '❌ Не сбылось'}
        </div>
        <button class="btn-delete" onclick="deleteQuestion('${q.id}', this)" style="margin-top:10px;">🗑 Удалить вопрос</button>
      ` : `
        <div class="actions">
          <button class="btn-yes" onclick="resolve('${q.id}', 'resolved_yes', this)">✅ Сбылось</button>
          <button class="btn-no" onclick="resolve('${q.id}', 'resolved_no', this)">❌ Не сбылось</button>
        </div>
        <button class="btn-delete" onclick="deleteQuestion('${q.id}', this)" style="margin-top:10px;">🗑 Удалить вопрос</button>
      `}
    `;
    container.appendChild(card);
  });
}

const NOTIFY_URL = 'https://insayt.vercel.app/api/notify';

async function resolve(id, result, btn) {
  btn.textContent = '⏳ Сохраняем...';
  btn.disabled = true;

  try {
    const response = await fetch(NOTIFY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question_id: id, result: result })
    });

    const data = await response.json();

    if (!response.ok) {
      showToast('❌ Ошибка: ' + (data.error || 'неизвестная'));
      btn.textContent = result === 'resolved_yes' ? '✅ Сбылось' : '❌ Не сбылось';
      btn.disabled = false;
      return;
    }

    showToast(`${result === 'resolved_yes' ? '✅ Сбылось' : '❌ Не сбылось'} — уведомлено ${data.sent} из ${data.total} участников`);
    await loadAll();

  } catch (e) {
    showToast('❌ Ошибка соединения');
    btn.textContent = result === 'resolved_yes' ? '✅ Сбылось' : '❌ Не сбылось';
    btn.disabled = false;
  }
}

async function deleteQuestion(id, btn) {
  if (!confirm('Удалить вопрос? Все голоса тоже удалятся.')) return;

  btn.textContent = '⏳ Удаляем...';
  btn.disabled = true;

  // Сначала удаляем голоса
  await db.from('votes').delete().eq('question_id', id);
  // Потом удаляем вопрос
  const { error } = await db.from('questions').delete().eq('id', id);

  if (error) {
    showToast('❌ Ошибка: ' + error.message);
    btn.textContent = '🗑 Удалить вопрос';
    btn.disabled = false;
    return;
  }

  showToast('🗑 Вопрос удалён');
  await loadAll();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
