<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИНСАЙТ — Админка</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f5f6fa; font-family:'Manrope',sans-serif; color:#1a1a2e; max-width:600px; margin:0 auto; padding:20px 20px 40px; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid #e0e3f0; }
  .header h1 { font-size:24px; font-weight:800; color:#3d5af1; }
  .stats { display:flex; gap:10px; margin-bottom:20px; }
  .stat-box { flex:1; background:white; border:1px solid rgba(61,90,241,0.12); border-radius:14px; padding:12px 8px; text-align:center; box-shadow:0 2px 12px rgba(61,90,241,0.06); }
  .stat-box .val { font-size:26px; font-weight:800; color:#3d5af1; }
  .stat-box .lbl { font-size:10px; color:#7b82a0; text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }
  .tabs { display:flex; gap:8px; margin-bottom:20px; background:white; border:1px solid rgba(61,90,241,0.12); border-radius:16px; padding:6px; box-shadow:0 2px 12px rgba(61,90,241,0.06); }
  .tab-btn { flex:1; padding:10px; border:none; border-radius:12px; font-family:'Manrope',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; background:transparent; color:#7b82a0; }
  .tab-btn.active { background:linear-gradient(135deg,#3d5af1,#2541b2); color:white; box-shadow:0 4px 12px rgba(61,90,241,0.3); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .section-title { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#7b82a0; margin-bottom:12px; margin-top:20px; }
  .section-title:first-child { margin-top:0; }
  .q-card { background:white; border:1px solid rgba(61,90,241,0.12); border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(61,90,241,0.06); }
  .q-card.resolved { opacity:0.65; border-color:#e0e3f0; }
  .q-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .q-topic { font-size:11px; font-weight:700; padding:3px 10px; border-radius:6px; background:rgba(61,90,241,0.08); color:#3d5af1; }
  .q-date { font-size:11px; color:#7b82a0; }
  .q-text { font-size:15px; font-weight:700; line-height:1.4; margin-bottom:12px; }
  .q-stats { display:flex; gap:16px; margin-bottom:12px; font-size:12px; color:#7b82a0; }
  .vote-bar { height:5px; background:#eef0f7; border-radius:4px; margin-bottom:5px; overflow:hidden; }
  .vote-bar-fill { height:100%; background:#3d5af1; border-radius:4px; transition:width 0.3s; }
  .vote-labels { display:flex; justify-content:space-between; font-size:11px; font-weight:700; margin-bottom:12px; }
  .vote-yes-label { color:#0abf7e; } .vote-no-label { color:#f05454; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .btn-yes { padding:10px; background:rgba(10,191,126,0.1); color:#0abf7e; border:1.5px solid rgba(10,191,126,0.3); border-radius:10px; font-family:'Manrope',sans-serif; font-size:12px; font-weight:800; cursor:pointer; transition:all 0.15s; }
  .btn-no { padding:10px; background:rgba(240,84,84,0.1); color:#f05454; border:1.5px solid rgba(240,84,84,0.3); border-radius:10px; font-family:'Manrope',sans-serif; font-size:12px; font-weight:800; cursor:pointer; transition:all 0.15s; }
  .btn-yes:hover { background:rgba(10,191,126,0.2); } .btn-no:hover { background:rgba(240,84,84,0.2); }
  .btn-edit { width:100%; padding:9px; background:rgba(61,90,241,0.08); color:#3d5af1; border:1.5px solid rgba(61,90,241,0.2); border-radius:10px; font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; margin-bottom:8px; display:block; }
  .btn-edit:hover { background:rgba(61,90,241,0.15); }
  .btn-delete { width:100%; padding:9px; background:rgba(240,84,84,0.06); color:#f05454; border:1.5px solid rgba(240,84,84,0.2); border-radius:10px; font-family:'Manrope',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; display:block; }
  .btn-delete:hover { background:rgba(240,84,84,0.15); }
  .resolved-badge { display:flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:700; width:100%; margin-bottom:8px; }
  .resolved-yes { background:rgba(10,191,126,0.1); color:#0abf7e; }
  .resolved-no { background:rgba(240,84,84,0.1); color:#f05454; }
  .modal-overlay { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:20px; padding:24px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .modal h3 { font-size:18px; font-weight:800; margin-bottom:20px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#7b82a0; margin-bottom:6px; }
  .field input, .field textarea { width:100%; padding:11px 14px; border:1.5px solid rgba(61,90,241,0.2); border-radius:12px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:600; color:#1a1a2e; outline:none; background:#f5f6fa; transition:border-color 0.2s; }
  .field input:focus, .field textarea:focus { border-color:#3d5af1; background:white; }
  .field textarea { resize:none; min-height:80px; line-height:1.5; }
  .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
  .btn-save { padding:13px; background:linear-gradient(135deg,#3d5af1,#2541b2); color:white; border:none; border-radius:12px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:800; cursor:pointer; }
  .btn-cancel { padding:13px; background:#eef0f7; color:#7b82a0; border:none; border-radius:12px; font-family:'Manrope',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-cancel:hover { background:#e0e3f0; }
  .search-input { width:100%; padding:11px 16px; margin-bottom:14px; border:1.5px solid rgba(61,90,241,0.2); border-radius:14px; font-family:'Manrope',sans-serif; font-size:14px; outline:none; background:white; box-shadow:0 2px 12px rgba(61,90,241,0.06); display:block; }
  .search-input:focus { border-color:#3d5af1; }
  .user-card { background:white; border:1px solid rgba(61,90,241,0.12); border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 12px rgba(61,90,241,0.06); }
  .loading { text-align:center; padding:40px; color:#7b82a0; font-size:15px; }
  .password-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; }
  .password-screen h2 { font-size:22px; font-weight:800; color:#3d5af1; }
  .pwd-row { display:flex; align-items:center; gap:8px; width:100%; max-width:300px; }
  .pwd-row input { flex:1; padding:14px 18px; border:1.5px solid rgba(61,90,241,0.2); border-radius:14px; font-family:'Manrope',sans-serif; font-size:16px; outline:none; box-sizing:border-box; }
  .pwd-eye { background:#eef0f7; border:1.5px solid rgba(61,90,241,0.2); border-radius:12px; width:48px; height:48px; cursor:pointer; font-size:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .pwd-submit { width:100%; max-width:300px; padding:14px; background:linear-gradient(135deg,#3d5af1,#2541b2); color:white; border:none; border-radius:14px; font-family:'Manrope',sans-serif; font-size:16px; font-weight:800; cursor:pointer; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:white; padding:12px 24px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; z-index:2000; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div id="password-screen" class="password-screen" style="display:none;">
  <div style="font-size:40px;">🔐</div>
  <h2>ИНСАЙТ Админка</h2>
  <div class="pwd-row">
    <input type="password" id="pwd-input" placeholder="Введи пароль" onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="pwd-eye" onclick="togglePassword()" id="pwd-eye">👁</button>
  </div>
  <button class="pwd-submit" onclick="checkPassword()">Войти</button>
</div>

<div id="admin-content" style="display:none;">
  <div class="header">
    <h1>🔮 ИНСАЙТ</h1>
    <div style="font-size:13px;color:#7b82a0;font-weight:600;">Панель управления</div>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="val" id="stat-active">—</div><div class="lbl">Активных</div></div>
    <div class="stat-box"><div class="val" id="stat-resolved">—</div><div class="lbl">Закрытых</div></div>
    <div class="stat-box"><div class="val" id="stat-users">—</div><div class="lbl">Польз.</div></div>
    <div class="stat-box"><div class="val" id="stat-votes">—</div><div class="lbl">Голосов</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-questions" onclick="switchTab('questions', this)">📋 Вопросы</button>
    <button class="tab-btn" id="tab-btn-users" onclick="switchTab('users', this)">👥 Пользователи</button>
  </div>

  <div class="tab-content active" id="tab-questions">
    <div class="section-title">Активные вопросы</div>
    <div id="active-list"><div class="loading">Загрузка...</div></div>
    <div class="section-title">Закрытые вопросы</div>
    <div id="resolved-list"><div class="loading">Загрузка...</div></div>
  </div>

  <div class="tab-content" id="tab-users">
    <input type="text" class="search-input" placeholder="🔍 Поиск по имени или @username" oninput="filterUsers(this.value)">
    <div id="users-list"><div class="loading">Загрузка...</div></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ Редактировать вопрос</h3>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Вопрос</label><textarea id="edit-text" rows="3"></textarea></div>
    <div class="field"><label>Вариант ДА</label><input type="text" id="edit-yes"></div>
    <div class="field"><label>Вариант НЕТ</label><input type="text" id="edit-no"></div>
    <div class="field"><label>Тема</label><input type="text" id="edit-topic"></div>
    <div class="field"><label>Дата закрытия</label><input type="date" id="edit-date"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveEdit()">💾 Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jnvlcanwkrfcjeqqwlib.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x-ocfhMqmjrjn44Via5c8w_t_ooGf74';
const ADMIN_TOKEN = '338c78a5ac9318c6da238e0a96f5d033';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function togglePassword() {
  const input = document.getElementById('pwd-input');
  const eye = document.getElementById('pwd-eye');
  input.type = input.type === 'password' ? 'text' : 'password';
  eye.textContent = input.type === 'password' ? '👁' : '🙈';
}

function checkPassword() {
  if (document.getElementById('pwd-input').value === ADMIN_TOKEN) {
    sessionStorage.setItem('insayt_admin', '1');
    showAdmin();
  } else {
    showToast('❌ Неверный пароль');
  }
}

function showAdmin() {
  document.getElementById('password-screen').style.display = 'none';
  document.getElementById('admin-content').style.display = 'block';
  loadAll();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

async function loadAll() {
  await Promise.all([loadStats(), loadQuestions(), loadUsers()]);
}

async function loadStats() {
  const [a, r, u, v] = await Promise.all([
    db.from('questions').select('*', {count:'exact',head:true}).eq('status','active'),
    db.from('questions').select('*', {count:'exact',head:true}).in('status',['resolved_yes','resolved_no']),
    db.from('users').select('*', {count:'exact',head:true}),
    db.from('votes').select('*', {count:'exact',head:true})
  ]);
  document.getElementById('stat-active').textContent = a.count || 0;
  document.getElementById('stat-resolved').textContent = r.count || 0;
  document.getElementById('stat-users').textContent = u.count || 0;
  document.getElementById('stat-votes').textContent = v.count || 0;
}

async function loadQuestions() {
  const { data } = await db.from('questions').select('*').order('created_at', {ascending: false});
  if (!data) return;
  renderList('active-list', data.filter(q => q.status === 'active'), false);
  renderList('resolved-list', data.filter(q => q.status !== 'active'), true);
}

function renderList(containerId, questions, isResolved) {
  const container = document.getElementById(containerId);
  if (!questions.length) {
    container.innerHTML = `<div style="text-align:center;padding:20px;color:#7b82a0;font-size:14px;">Нет вопросов</div>`;
    return;
  }
  container.innerHTML = '';
  questions.forEach(q => {
    const total = q.votes_yes + q.votes_no;
    const pctYes = total > 0 ? Math.round(q.votes_yes / total * 100) : 50;
    const date = q.closes_at ? new Date(q.closes_at).toLocaleDateString('ru') : 'Без даты';
    const dateVal = q.closes_at ? q.closes_at.substring(0,10) : '';
    const textEsc = q.text.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
    const card = document.createElement('div');
    card.className = 'q-card' + (isResolved ? ' resolved' : '');
    card.innerHTML = `
      <div class="q-meta">
        <div class="q-topic">${q.topic}</div>
        <div class="q-date">📅 ${date}</div>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="q-stats"><span>👥 ${total} голосов</span><span>✓ ${q.option_yes} / ✗ ${q.option_no}</span></div>
      <div class="vote-bar"><div class="vote-bar-fill" style="width:${pctYes}%"></div></div>
      <div class="vote-labels"><span class="vote-yes-label">ДА — ${pctYes}%</span><span class="vote-no-label">НЕТ — ${100-pctYes}%</span></div>
      ${isResolved ? `<div class="resolved-badge ${q.status==='resolved_yes'?'resolved-yes':'resolved-no'}">${q.status==='resolved_yes'?'✅ Сбылось':'❌ Не сбылось'}</div>` : `
      <div class="actions">
        <button class="btn-yes" onclick="resolve('${q.id}','resolved_yes',this)">✅ Сбылось</button>
        <button class="btn-no" onclick="resolve('${q.id}','resolved_no',this)">❌ Не сбылось</button>
      </div>`}
      <button class="btn-edit" onclick="openEdit('${q.id}','${textEsc}','${q.option_yes}','${q.option_no}','${q.topic}','${dateVal}')">✏️ Редактировать</button>
      <button class="btn-delete" onclick="deleteQuestion('${q.id}',this)">🗑 Удалить вопрос</button>
    `;
    container.appendChild(card);
  });
}

const NOTIFY_URL = 'https://insayt.vercel.app/api/notify';

async function resolve(id, result, btn) {
  btn.textContent = '⏳ Сохраняем...'; btn.disabled = true;
  try {
    const res = await fetch(NOTIFY_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question_id:id, result})});
    const data = await res.json();
    if (!res.ok) { showToast('❌ Ошибка: ' + (data.error||'неизвестная')); btn.textContent = result==='resolved_yes'?'✅ Сбылось':'❌ Не сбылось'; btn.disabled=false; return; }
    showToast(`${result==='resolved_yes'?'✅':'❌'} Закрыто — уведомлено ${data.sent} из ${data.total}`);
    await loadAll();
  } catch(e) { showToast('❌ Ошибка соединения'); btn.textContent = result==='resolved_yes'?'✅ Сбылось':'❌ Не сбылось'; btn.disabled=false; }
}

async function deleteQuestion(id, btn) {
  if (!confirm('Удалить вопрос? Все голоса тоже удалятся.')) return;
  btn.textContent = '⏳ Удаляем...'; btn.disabled = true;
  await db.from('votes').delete().eq('question_id', id);
  const { error } = await db.from('questions').delete().eq('id', id);
  if (error) { showToast('❌ Ошибка: ' + error.message); btn.textContent='🗑 Удалить вопрос'; btn.disabled=false; return; }
  showToast('🗑 Вопрос удалён');
  await loadAll();
}

function openEdit(id, text, optYes, optNo, topic, date) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-text').value = text.replace(/&quot;/g,'"');
  document.getElementById('edit-yes').value = optYes;
  document.getElementById('edit-no').value = optNo;
  document.getElementById('edit-topic').value = topic;
  document.getElementById('edit-date').value = date;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const text = document.getElementById('edit-text').value.trim();
  const optYes = document.getElementById('edit-yes').value.trim();
  const optNo = document.getElementById('edit-no').value.trim();
  const topic = document.getElementById('edit-topic').value.trim();
  const dateVal = document.getElementById('edit-date').value;
  if (!text || !optYes || !optNo) { showToast('⚠️ Заполни все поля'); return; }
  const btn = document.querySelector('#edit-modal .btn-save');
  btn.textContent = 'Сохраняем...'; btn.disabled = true;
  const { error } = await db.from('questions').update({text, option_yes:optYes, option_no:optNo, topic, closes_at: dateVal ? new Date(dateVal).toISOString() : null}).eq('id', id);
  btn.textContent = '💾 Сохранить'; btn.disabled = false;
  if (error) { showToast('❌ Ошибка: ' + error.message); return; }
  showToast('✅ Вопрос обновлён');
  closeModal();
  await loadAll();
}

document.getElementById('edit-modal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });

let _allUsers = [];

async function loadUsers() {
  const { data } = await db.from('users').select('id,name,username,photo_url,points,correct,total,streak,topics,onboarding_done,created_at').order('points',{ascending:false});
  if (!data) return;
  _allUsers = data;
  renderUsers(data);
}

function filterUsers(query) {
  const q = query.toLowerCase().trim();
  renderUsers(!q ? _allUsers : _allUsers.filter(u => (u.name||'').toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q)));
}

function renderUsers(users) {
  const container = document.getElementById('users-list');
  if (!users.length) { container.innerHTML=`<div style="text-align:center;padding:20px;color:#7b82a0;font-size:14px;">Нет пользователей</div>`; return; }
  container.innerHTML = '';
  users.forEach(u => {
    const accuracy = u.total > 0 ? Math.round(u.correct/u.total*100) : 0;
    const topics = (u.topics&&u.topics.length>0) ? u.topics.join(', ') : '—';
    const joined = new Date(u.created_at).toLocaleDateString('ru');
    const avatar = u.photo_url
      ? `<img src="${u.photo_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
      : `<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3d5af1,#0abf7e);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">😊</div>`;
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        ${avatar}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u.name||'Без имени'}</div>
          <div style="font-size:12px;color:#7b82a0;">${u.username?'@'+u.username:'без username'} · ${joined}</div>
        </div>
        <div style="font-size:20px;font-weight:800;color:#2541b2;">${(u.points||0).toLocaleString('ru')}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;margin-bottom:8px;">
        <div style="background:#f5f6fa;border-radius:10px;padding:8px;text-align:center;"><div style="font-weight:700;color:#0abf7e;">${accuracy}%</div><div style="color:#7b82a0;">точность</div></div>
        <div style="background:#f5f6fa;border-radius:10px;padding:8px;text-align:center;"><div style="font-weight:700;color:#2541b2;">${u.total||0}</div><div style="color:#7b82a0;">прогнозов</div></div>
        <div style="background:#f5f6fa;border-radius:10px;padding:8px;text-align:center;"><div style="font-weight:700;color:#fdcb6e;">🔥${u.streak||0}</div><div style="color:#7b82a0;">серия</div></div>
      </div>
      <div style="font-size:11px;color:#7b82a0;">Темы: <span style="color:#3d5af1;font-weight:600;">${topics}</span> · Онбординг: <span style="color:${u.onboarding_done?'#0abf7e':'#f05454'};font-weight:600;">${u.onboarding_done?'✅':'❌'}</span></div>
    `;
    container.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const hasToken = params.get('token') === ADMIN_TOKEN;
  let hasSession = false;
  try { hasSession = sessionStorage.getItem('insayt_admin') === '1'; } catch(e) {}
  if (hasToken || hasSession) {
    try { sessionStorage.setItem('insayt_admin', '1'); } catch(e) {}
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('password-screen').style.display = 'flex';
  }
});
</script>
</body>
</html>
